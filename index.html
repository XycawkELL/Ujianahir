<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Login.css"/>
</head>
<body>

  <div class="card">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In -->
    <div class="form" id="signin">
      <div class="form-group">
        <input type="text" class="input" placeholder="Username atau Email" />
      </div>
      <div class="form-group input-wrapper">
        <input type="password" class="input" placeholder="Password" />
        <button class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg" class="eye-icon" />
        </button>
      </div>
      <button class="btn-submit">→</button>
    </div>

    <!-- Sign Up -->
    <div class="form hidden" id="signup">
      <div class="form-group">
        <input type="text" class="input" placeholder="Username" />
      </div>
      <div class="form-group">
        <input type="email" class="input" placeholder="Email" />
      </div>
      <div class="form-group input-wrapper">
        <input type="password" class="input" placeholder="Password" />
        <button class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg" class="eye-icon" />
        </button>
      </div>
      <div class="form-group input-wrapper">
        <input type="password" class="input" placeholder="Konfirmasi Password" />
        <button class="toggle-pw" onclick="togglePassword(this)" tabindex="-1">
          <img src="https://cdn.jsdelivr.net/npm/lucide-static@0.441.0/icons/eye.svg" class="eye-icon" />
        </button>
      </div>
      <button class="btn-submit">→</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
